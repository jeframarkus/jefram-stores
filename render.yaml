# Render Blueprint for the Jefram Stores backend.
# In Render: New + > Blueprint > connect this repo. Render creates the
# PostgreSQL database and the API web service automatically.
databases:
  - name: jefram-db
    databaseName: jefram
    user: jefram
    plan: free

services:
  - type: web
    name: jefram-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jefram-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      # Set these in the Render dashboard, then run `npm run seed` once from the
      # service Shell to create the first admin and sample products.
      - key: SEED_ADMIN_PHONE
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        sync: false
