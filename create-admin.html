<!DOCTYPE html>
<html>
<head>
    <title>Create Admin</title>
</head>
<body>
    <h2>Creating Admin...</h2>
    <div id="result"></div>
    
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc } from "firebase/firestore";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAoNFbS548PhPO1XmfXfDBiSfHzJ5WRvDY",
            authDomain: "jefram-stores.firebaseapp.com",
            projectId: "jefram-stores",
            storageBucket: "jefram-stores.firebasestorage.app",
            messagingSenderId: "669495715459",
            appId: "1:669495715459:web:1d6bedbba9dc27cf8e1db6"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // Simple SHA-256 hash function using Web Crypto API
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }
        
        try {
            const username = "master";
            const password = "admin1409";
            const hashedPassword = await hashPassword(password);
            
            const docRef = await addDoc(collection(db, "admins"), {
                username: username,
                password: hashedPassword,
                role: "master",
                createdAt: new Date().toISOString()
            });
            document.getElementById('result').innerHTML = `
                <div style="color: green;">
                    <h3>✅ Admin Created Successfully!</h3>
                    <p>Username: <strong>${username}</strong></p>
                    <p>Password: <strong>${password}</strong></p>
                    <p>Hashed: <strong>${hashedPassword.substring(0, 16)}...</strong></p>
                    <p>Document ID: ${docRef.id}</p>
                    <p style="color: #666; font-size: 12px;">Password is now hashed for security</p>
                </div>
            `;
        } catch (error) {
            document.getElementById('result').innerHTML = `
                <div style="color: red;">
                    <h3>❌ Error:</h3>
                    <p>${error.message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
