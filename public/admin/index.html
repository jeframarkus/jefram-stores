<!DOCTYPE html>
<html>
<head>
    <title>Admin - Jefram Stores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .image-preview {
            width: 100%;
            height: 150px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            overflow: hidden;
        }
        
        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add New Product</h2>
        
        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price (UGX)" type="number">
        <input id="category" placeholder="Category (e.g., Electronics, Clothing)">
        <input id="subcategory" placeholder="Subcategory">
        
        <input id="image" placeholder="Image URL (e.g., https://via.placeholder.com/300)">
        <div class="image-preview" id="imagePreview">
            <span>Enter a URL above to preview</span>
        </div>
        <div class="hint">💡 Tip: Right-click any image online and select "Copy image URL"</div>
        
        <textarea id="desc" placeholder="Product Description"></textarea>
        <input id="stock" placeholder="Stock Quantity" type="number" value="10">
        
        <button id="addBtn" onclick="addProduct()">Add Product</button>
        <div id="message" class="message"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyAoNFbS548PhPO1XmfXfDBiSfHzJ5WRvDY",
            authDomain: "jefram-stores.firebaseapp.com",
            projectId: "jefram-stores",
            storageBucket: "jefram-stores.firebasestorage.app",
            messagingSenderId: "669495715459",
            appId: "1:669495715459:web:1d6bedbba9dc27cf8e1db6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }
        
        // Preview image when URL is entered
        document.getElementById('image').addEventListener('input', function() {
            const url = this.value;
            const preview = document.getElementById('imagePreview');
            if (url) {
                preview.innerHTML = `<img src="${url}" onerror="this.style.display='none'; this.nextSibling.style.display='block'" style="max-width:100%; max-height:100%;"><span style="display:none;">Invalid image URL</span>`;
            } else {
                preview.innerHTML = '<span>Enter a URL above to preview</span>';
            }
        });
        
        window.addProduct = async function() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const category = document.getElementById('category').value;
            const subcategory = document.getElementById('subcategory').value;
            const image_url = document.getElementById('image').value;
            const description = document.getElementById('desc').value;
            const stock = document.getElementById('stock').value;
            
            if (!name || !price || !category) {
                showMessage('Please fill name, price, and category', 'error');
                return;
            }
            
            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true;
            addBtn.innerHTML = '<span class="loading"></span> Adding Product...';
            
            try {
                const productsRef = collection(db, 'products');
                await addDoc(productsRef, {
                    name: name,
                    price: parseFloat(price),
                    category: category,
                    subcategory: subcategory,
                    image_url: image_url || 'https://via.placeholder.com/300',
                    description: description,
                    stock: parseInt(stock) || 0,
                    createdAt: new Date().toISOString()
                });
                
                showMessage('Product added successfully!', 'success');
                
                // Clear form
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('category').value = '';
                document.getElementById('subcategory').value = '';
                document.getElementById('image').value = '';
                document.getElementById('desc').value = '';
                document.getElementById('stock').value = '10';
                document.getElementById('imagePreview').innerHTML = '<span>Enter a URL above to preview</span>';
                
            } catch (error) {
                console.error('Error adding product:', error);
                showMessage('Failed to add product: ' + error.message, 'error');
            } finally {
                addBtn.disabled = false;
                addBtn.innerHTML = 'Add Product';
            }
        };
    </script>
</body>
</html>
