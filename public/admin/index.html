<!DOCTYPE html>
<html>
<head>
    <title>Admin - Jefram Stores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .image-preview {
            width: 100%;
            height: 200px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9f9f9;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        
        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .image-preview span {
            color: #999;
            text-align: center;
        }
        
        .file-input {
            display: none;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Add New Product</h2>
        
        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price (UGX)" type="number">
        <input id="category" placeholder="Category (e.g., Electronics, Clothing)">
        <input id="subcategory" placeholder="Subcategory">
        
        <div class="image-preview" onclick="document.getElementById('imageInput').click()">
            <span id="previewText">Click to upload product image</span>
            <img id="previewImage" style="display: none;">
        </div>
        <input type="file" id="imageInput" class="file-input" accept="image/*" onchange="previewImage(this)">
        
        <textarea id="desc" placeholder="Product Description"></textarea>
        <input id="stock" placeholder="Stock Quantity" type="number" value="10">
        
        <button id="addBtn" onclick="addProduct()">Add Product</button>
        <div id="message" class="message"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, addDoc } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyBTTaQPLMW7giaXfMIy-nLLhoNf6fHuV4g",
            authDomain: "jefram-store.firebaseapp.com",
            projectId: "jefram-store",
            storageBucket: "jefram-store.firebasestorage.app",
            messagingSenderId: "721543300616",
            appId: "1:721543300616:web:5e799d663fcbbaed6a33bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let selectedImageFile = null;

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }
        
        window.previewImage = function(input) {
            if (input.files && input.files[0]) {
                selectedImageFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').style.display = 'block';
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('previewText').style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        };
        
        // Convert image to base64 (no external API needed!)
        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        window.addProduct = async function() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const category = document.getElementById('category').value;
            const subcategory = document.getElementById('subcategory').value;
            const description = document.getElementById('desc').value;
            const stock = document.getElementById('stock').value;
            
            if (!name || !price || !category) {
                showMessage('Please fill name, price, and category', 'error');
                return;
            }
            
            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true;
            addBtn.innerHTML = '<span class="loading"></span> Adding Product...';
            
            try {
                let imageUrl = 'https://via.placeholder.com/300';
                
                // Convert image to base64 and store directly
                if (selectedImageFile) {
                    imageUrl = await convertToBase64(selectedImageFile);
                }
                
                const productsRef = collection(db, 'products');
                await addDoc(productsRef, {
                    name: name,
                    price: parseFloat(price),
                    category: category,
                    subcategory: subcategory,
                    image_url: imageUrl,
                    description: description,
                    stock: parseInt(stock) || 0,
                    createdAt: new Date().toISOString()
                });
                
                showMessage('Product added successfully!', 'success');
                
                // Clear form
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('category').value = '';
                document.getElementById('subcategory').value = '';
                document.getElementById('desc').value = '';
                document.getElementById('stock').value = '10';
                document.getElementById('previewImage').style.display = 'none';
                document.getElementById('previewImage').src = '';
                document.getElementById('previewText').style.display = 'block';
                document.getElementById('imageInput').value = '';
                selectedImageFile = null;
                
            } catch (error) {
                console.error('Error adding product:', error);
                showMessage('Failed to add product: ' + error.message, 'error');
            } finally {
                addBtn.disabled = false;
                addBtn.innerHTML = 'Add Product';
            }
        };
    </script>
</body>
</html>
